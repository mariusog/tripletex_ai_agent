# CI Pipeline -- mirrors local Claude Code hooks
# Adapt the commands below to match your CLAUDE.md Project Tooling table.
#
# This template uses Python defaults. Replace the marked sections for other languages.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # --- Language setup (replace for your stack) ---
    # TypeScript: uses: actions/setup-node@v4 + npm ci
    # Go:         uses: actions/setup-go@v5
    # Rust:       uses: dtolnay/rust-toolchain@stable + cargo build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt 2>/dev/null || pip install -r requirements-dev.txt 2>/dev/null || true
          pip install ruff mypy bandit pip-audit

      # --- Quality gates (mirror your Tooling table) ---
      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # Remove once type coverage is complete

      - name: Security scan
        run: |
          bandit -r src/ -ll -q
          pip-audit --strict || true

      - name: Tests
        run: python -m pytest tests/ -q --tb=line -m "not slow" 2>&1 | tail -20

      - name: Test coverage
        run: |
          python -m pytest tests/ --cov=src --cov-report=term-missing -q 2>&1 | tail -20
        continue-on-error: true  # Remove once coverage target is met
